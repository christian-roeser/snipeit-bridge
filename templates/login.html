<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snipe-IT Bridge — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #1a1f2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 380px; border-radius: 1rem; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.35); }
    .login-icon { width: 56px; height: 56px; background: #4e9af1; border-radius: .75rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .form-control { background: #f8f9fa; border: 1px solid #e9ecef; }
    .form-control:focus { background: #fff; box-shadow: 0 0 0 3px rgba(78,154,241,.2); border-color: #4e9af1; }
    .btn-primary { background: #4e9af1; border: none; font-weight: 500; }
    .btn-primary:hover { background: #3a87e0; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="card-body p-5">
      <div class="login-icon">
        <i class="bi bi-arrow-left-right text-white fs-4"></i>
      </div>
      <h5 class="text-center fw-bold mb-1">Snipe-IT Bridge</h5>
      <p class="text-center text-muted small mb-4">Bitte anmelden</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 small">
            <i class="bi bi-exclamation-triangle me-1"></i>{{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Benutzername</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" name="username" class="form-control border-start-0 ps-0" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">Passwort</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control border-start-0 ps-0" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Anmelden
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
